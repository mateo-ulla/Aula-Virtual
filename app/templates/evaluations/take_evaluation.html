{% extends 'base.html' %} {% block title %}Rendir Evaluación{% endblock %} {%
block content %}
<h2>{{ evaluacion.titulo }}</h2>
<form method="POST">
  {% for pregunta in preguntas %}
  <div class="mb-3">
    <label class="form-label"><strong>{{ pregunta.texto }}</strong></label>
    {% for respuesta in pregunta.respuestas %}
    <div class="form-check">
      <input
        class="form-check-input"
        type="radio"
        name="pregunta_{{ pregunta.id }}"
        value="{{ respuesta.id }}"
        id="respuesta_{{ respuesta.id }}"
      />
      <label class="form-check-label" for="respuesta_{{ respuesta.id }}"
        >{{ respuesta.texto }}</label
      >
    </div>
    {% endfor %}
  </div>
  {% endfor %}
  <button type="submit" class="btn btn-primary">Enviar</button>
</form>
{% endblock %}
